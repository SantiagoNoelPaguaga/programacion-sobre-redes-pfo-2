<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bienvenida</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #4f46e5;
        --primary-soft: #e0e7ff;
        --bg: #f8fafc;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --white: #ffffff;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg);
        margin: 0;
        color: var(--text-main);
      }

      .navbar {
        background: var(--white);
        padding: 0 2rem;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 70px;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .subject-tag {
        background: var(--primary-soft);
        color: var(--primary);
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      .user-profile {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .welcome-text {
        font-size: 0.95rem;
        font-weight: 400;
        color: var(--text-muted);
      }

      .welcome-text strong {
        color: var(--text-main);
        font-weight: 600;
      }

      .dashboard {
        max-width: 800px;
        margin: 60px auto;
        padding: 0 20px;
        text-align: center;
      }

      .hero-card {
        background: var(--white);
        padding: 4rem 2rem;
        border-radius: 24px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(226, 232, 240, 0.8);
      }

      .hero-card h1 {
        font-size: 2.5rem;
        margin: 0 0 1rem 0;
        color: var(--text-main);
        font-weight: 600;
      }

      .hero-card p {
        color: var(--text-muted);
        font-size: 1.1rem;
        line-height: 1.6;
        margin: 0;
      }

      @media (max-width: 600px) {
        .navbar {
          padding: 0 1rem;
        }
        .welcome-text {
          display: none;
        }
        .hero-card h1 {
          font-size: 1.8rem;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="subject-tag">Programación sobre redes - PFO 2</div>

      <div class="user-profile">
        <span class="welcome-text">
          Bienvenido, <strong id="user-name">Cargando...</strong>
        </span>
      </div>
    </nav>

    <main class="dashboard">
      <div class="hero-card">
        <h1>Sistema de Gestión de Tareas</h1>
        <p>Accediste al portal de gestión de tareas.</p>
      </div>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const nombreUsuario = params.get("nombre");

      if (nombreUsuario) {
        document.getElementById("user-name").textContent = nombreUsuario;
      } else {
        document.getElementById("user-name").textContent = "Invitado";
      }
    </script>
  </body>
</html>
